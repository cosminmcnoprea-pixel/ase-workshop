# Docker Compose for Cloud SQL deployment
# This configuration connects to GCP Cloud SQL instance

version: '3.8'

services:
  # Cloud SQL Proxy - connects to GCP Cloud SQL
  cloud-sql-proxy:
    image: gcr.io/cloudsql-docker/gce-proxy:1.33.2
    command:
      - "/cloud_sql_proxy"
      - "-instances=PROJECT_ID:us-central1:devtaskhub-db=tcp:5432"
      - "-credential_file=/config/service-account.json"
    volumes:
      - "./service-account.json:/config/service-account.json:ro"
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Task Service with Cloud SQL
  task-service:
    build: ./task-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@cloud-sql-proxy:5432/devtaskhub
    depends_on:
      cloud-sql-proxy:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Notification Service with Cloud SQL
  notification-service:
    build: ./notification-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@cloud-sql-proxy:5432/devtaskhub
    depends_on:
      cloud-sql-proxy:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_TASK_API_URL: http://localhost:8000
        VITE_NOTIFICATION_API_URL: http://localhost:3001
        VITE_UTILITY_API_URL: http://localhost:8080/utility
    ports:
      - "3000:80"
    depends_on:
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      utility-service:
        condition: service_healthy

  # Utility Service with Cloud SQL
  utility-service:
    build: ./utility-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@cloud-sql-proxy:5432/devtaskhub
      EMAIL_USERNAME: ${EMAIL_USERNAME:-noreply@devtaskhub.com}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-your-app-password}
    depends_on:
      cloud-sql-proxy:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/utility/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
