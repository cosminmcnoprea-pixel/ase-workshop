services:
  task-service:
    build: ./task-service
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build: ./notification-service
    ports:
      - "3001:3001"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:3001/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  ticket-monitor:
    build: ./ticket-monitor
    ports:
      - "8002:8002"
    env_file:
      - ./ticket-monitor/.env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TASK_API_URL: http://localhost:8000
        VITE_NOTIFICATION_API_URL: http://localhost:3001
        VITE_TICKET_MONITOR_URL: http://localhost:8002
    ports:
      - "3000:80"
    depends_on:
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      ticket-monitor:
        condition: service_healthy
