services:
  task-service:
    build: ./task-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  notification-service:
    build: ./notification-service
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      AUTH_DB: authdb
      AUTH_USER: authuser
      AUTH_PASSWORD: authpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://authuser:authpass@postgres:5432/authdb
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 4001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_TASK_API_URL: http://localhost:8000
        VITE_NOTIFICATION_API_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
