name: Task Service CI/CD

on:
  push:
    branches: [main, feature/postgresql-integration-with-edit]
    paths:
      - 'task-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'task-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: task-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: python -m py_compile main.py

      - name: Run tests
        run: pytest tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/postgresql-integration-with-edit')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./task-service
          push: false
          tags: devtask-hub/task-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment and configure for your registry:
