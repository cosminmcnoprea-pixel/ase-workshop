name: Collaboration Service CI/CD

on:
  push:
    branches: [ main ]
    paths: [ 'collaboration-service/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'collaboration-service/**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'collaboration-service/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./collaboration-service
      run: npm ci
      
    - name: Run tests
      working-directory: ./collaboration-service
      run: npm test
      
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: collaboration-service/coverage/

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'collaboration-service/package-lock.json'
        
    - name: Install dependencies
      working-directory: ./collaboration-service
      run: npm ci --production
      
    - name: Build Docker image
      run: |
        docker build -t collaboration-service ./collaboration-service
        
    - name: Login to Container Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Push Docker image
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag collaboration-service ghcr.io/${{ github.repository }}/collaboration-service:latest
        docker push ghcr.io/${{ github.repository }}/collaboration-service:latest
