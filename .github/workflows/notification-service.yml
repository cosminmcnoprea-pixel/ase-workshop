name: Notification Service CI/CD

on:
  push:
    branches: [main, feature/postgresql-integration-with-edit]
    paths:
      - 'notification-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'notification-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notification-service/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/postgresql-integration-with-edit')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: false
          tags: devtask-hub/notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Uncomment for your registry:
      # - name: Push to GHCR
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./notification-service
      #     push: true
      #     tags: ghcr.io/${{ github.repository }}/notification-service:latest
